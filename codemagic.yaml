workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.trapix.app
      vars:
        ENV_FILE_CONTENT: $ENV_FILE_CONTENT
    scripts:
      - name: Create .env file
        script: |
          cat > "$CM_BUILD_DIR/.env" << 'EOF'
          $ENV_FILE_CONTENT
          EOF
          echo ".env created at $CM_BUILD_DIR/.env"
          ls -la "$CM_BUILD_DIR/.env"
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build iOS
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
