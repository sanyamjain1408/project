workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing
      vars:
        ENV_FILE_CONTENT: $ENV_FILE_CONTENT
    scripts:
      - name: Create .env file
        script: |
          cat > "$CM_BUILD_DIR/.env" << 'EOF'
          $ENV_FILE_CONTENT
          EOF
      - name: Set up code signing
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          keychain initialize
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          xcode-project use-profiles --profile /tmp/profile.mobileprovision
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter build iOS
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
